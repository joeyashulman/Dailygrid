name: Deploy built app to Pages root

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: "pages-root"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Prevent infinite loop: this workflow pushes changes back to main.
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy dist to repo root
        run: |
          rm -rf ./assets
          cp ./dist/index.html ./index.html
          cp ./dist/vite.svg ./vite.svg
          cp ./dist/wordlist.txt ./wordlist.txt
          mkdir -p ./assets
          cp -R ./dist/assets/* ./assets/

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./index.html ./assets ./vite.svg ./wordlist.txt
          if git diff --cached --quiet; then
            echo "No Pages root changes to commit."
            exit 0
          fi
          git commit -m "Deploy built app to Pages root"
          git push

